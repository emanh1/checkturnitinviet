faq:
  title: Câu hỏi thường gặp
  description: Dưới đây là một số câu hỏi thường gặp từ người dùng của chúng tôi.
  items:
    - label: Dịch vụ này có an toàn không?
      content: Chúng tôi sử dụng mã hóa SSL và tuân thủ các tiêu chuẩn bảo mật cao nhất để bảo vệ dữ liệu của bạn.
      # icon: i-lucide-lock
    - label: Làm thế nào để hủy đăng ký?
      content: Bạn có thể hủy đăng ký bất cứ lúc nào từ trang tài khoản của mình.
    - label: Bản dùng thử miễn phí hoạt động như thế nào?
      content: Bạn có thể dùng thử miễn phí trong 7 ngày mà không cần thẻ credits.
    - label: Tôi có thể chuyển kế hoạch sau không?
      content: Có, bạn có thể nâng cấp hoặc hạ cấp kế hoạch bất cứ lúc nào.
    - label: Bạn có cung cấp hoàn tiền không?
      content: Chúng tôi cung cấp chính sách hoàn tiền trong vòng 30 ngày.
    - label: Bạn có cung cấp hỗ trợ không?
      content: Có, chúng tôi cung cấp hỗ trợ qua email và chat trực tiếp.
